<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor 3D</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(180deg, #07111f 0%, #0b1020 55%, #10162a 100%);
      font-family: Arial, sans-serif;
    }

    model-viewer {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    #status {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      max-width: min(92vw, 520px);
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(11, 16, 32, 0.82);
      color: #f3f6ff;
      font-size: 14px;
      line-height: 1.4;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    #hint {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      color: #0b1020;
      font-size: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    #reset {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: #ffd166;
      color: #102040;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    #reset:active {
      transform: translateY(1px);
    }
  </style>
  <script>
    window.ModelViewerElement = window.ModelViewerElement || {};
    window.ModelViewerElement.dracoDecoderLocation = "https://www.gstatic.com/draco/v1/decoders/";
  </script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
</head>
<body>
  <div id="status">Cargando visor 3D y modelo...</div>
  <div id="hint">Arrastra para orbitar, pellizca o rueda para zoom</div>
  <button id="reset" type="button">Reset vista</button>

  <model-viewer
    id="viewer"
    src="./prueba-1.glb"
    alt="Modelo 3D generado por WebODM"
    camera-controls
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    camera-orbit="45deg 35deg auto"
    interaction-prompt="none">
  </model-viewer>

  <script>
    const statusEl = document.getElementById("status");
    const viewer = document.getElementById("viewer");
    const resetButton = document.getElementById("reset");

    viewer.addEventListener("load", () => {
      statusEl.textContent = "Modelo cargado. Puedes rodearlo y darle la vuelta para ver la parte trasera.";
    });

    viewer.addEventListener("error", (event) => {
      console.error(event);
      statusEl.textContent = "No se pudo cargar el modelo. Mira la consola del navegador.";
    });

    viewer.addEventListener("scene-graph-ready", () => {
      statusEl.textContent = "Modelo listo. Si se ve lejos, toca y arrastra para ajustar.";
    });

    resetButton.addEventListener("click", () => {
      viewer.cameraOrbit = "45deg 35deg auto";
      viewer.cameraTarget = "auto auto auto";
      statusEl.textContent = "Vista reiniciada.";
    });
  </script>
</body>
</html>

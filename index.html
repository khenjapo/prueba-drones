<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor Cesium GLB</title>
  <link
    rel="stylesheet"
    href="https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/Widgets/widgets.css?v=20260602-2"
  />
  <style>
    html,
    body,
    #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0b1020;
      font-family: Arial, sans-serif;
    }

    #status {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      max-width: min(90vw, 520px);
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(11, 16, 32, 0.78);
      color: #f3f6ff;
      font-size: 14px;
      line-height: 1.4;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    #hint {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.85);
      color: #0b1020;
      font-size: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }
  </style>
  <script>
    window.CESIUM_BASE_URL = "https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/?v=20260602-2";
  </script>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/Cesium.js?v=20260602-2"></script>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="status">Cargando Cesium y el modelo...</div>
  <div id="hint">Arrastra para orbitar, rueda para zoom</div>

  <script>
    const statusEl = document.getElementById("status");

    function setStatus(message) {
      statusEl.textContent = message;
    }

    async function main() {
      try {
        // WebODM suele exportar modelos georreferenciados; este centro parece venir en coordenadas
        // proyectadas tipo Web Mercator, así que lo convertimos a lon/lat para anclar el modelo.
        const modelOrigin = Cesium.Cartesian3.fromDegrees(3.11783675551067, 34.18884819353365, 0.0);
        const modelMatrix = Cesium.Transforms.headingPitchRollToFixedFrame(
          modelOrigin,
          new Cesium.HeadingPitchRoll(Cesium.Math.toRadians(90.0), 0.0, 0.0)
        );

        const viewer = new Cesium.Viewer("cesiumContainer", {
          animation: false,
          baseLayerPicker: false,
          fullscreenButton: false,
          geocoder: false,
          homeButton: false,
          infoBox: false,
          navigationHelpButton: false,
          sceneModePicker: false,
          selectionIndicator: false,
          timeline: false,
          vrButton: false,
          terrainProvider: new Cesium.EllipsoidTerrainProvider(),
          imageryProvider: new Cesium.GridImageryProvider(),
          useBrowserRecommendedResolution: true,
        });

        viewer.scene.globe.show = false;
        viewer.scene.skyBox = undefined;
        viewer.scene.skyAtmosphere = undefined;
        viewer.scene.sun.show = false;
        viewer.scene.moon.show = false;
        viewer.scene.backgroundColor = Cesium.Color.fromCssColorString("#0b1020");

        setStatus("Cargando modelo GLB...");

        const model = await Cesium.Model.fromGltfAsync({
          url: "./prueba-1.glb?v=20260602-2",
          show: true,
          scale: 1.0,
          minimumPixelSize: 64.0,
          modelMatrix,
        });

        viewer.scene.primitives.add(model);

        viewer.camera.lookAtTransform(
          modelMatrix,
          new Cesium.HeadingPitchRange(
            Cesium.Math.toRadians(20.0),
            Cesium.Math.toRadians(-25.0),
            1200.0
          )
        );

        setStatus("Modelo cargado. Ya ajusté cámara y rotación; prueba a orbitar y hacer zoom.");
      } catch (error) {
        console.error(error);
        setStatus(
          "No se pudo cargar el modelo. Abre la consola del navegador para ver el error exacto."
        );
      }
    }

    main();
  </script>
</body>
</html>
